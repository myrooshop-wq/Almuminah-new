<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO — Surat branch, also targets Mumbai searches -->
    <title>Al-Mu'minah School Surat | Islamic Girls School | SSC Board</title>
    <meta name="description" content="Al-Mu'minah Group of Schools, Surat — premier Islamic English medium girls school. Excellence in academics, Quranic Arabic & SSC board results. Admissions open 2026–27." />

    <link rel="canonical" href="https://almuminahschool.org/" />

    <!-- Geo targeting — tells Google this page is for Surat, India -->
    <meta name="geo.region" content="IN-GJ" />
    <meta name="geo.placename" content="Surat, Gujarat, India" />
    <meta name="geo.position" content="21.1702;72.8311" />
    <meta name="ICBM" content="21.1702, 72.8311" />

    <!-- Open Graph — WhatsApp, Facebook, LinkedIn previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://almuminahschool.org/" />
    <meta property="og:title" content="Al-Mu'minah School Surat | Islamic Girls School" />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="Al-Mu'minah School Surat" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Al-Mu'minah School Surat | Islamic Girls School" />
    <meta name="twitter:description" content="Premier Islamic girls school in Surat. Quranic Arabic + SSC academics. Admissions open." />
    <meta name="twitter:image" content="https://almuminahschool.org/og-image.jpg" />

    <!-- Schema.org — Google rich results for Educational Org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Al-Mu'minah School Surat",
      "alternateName": ["Al-Muminah School", "Al-Muminah Group of Schools Surat"],
      "url": "https://almuminahschool.org",
      "logo": "https://almuminahschool.org/og-image.jpg",
      "image": "https://almuminahschool.org/og-image.jpg",
      "description": "Premier Islamic English medium girls school in Surat, Gujarat. Part of Al-Mu'minah Group of Schools. Excellence in SSC academics integrated with Quranic Arabic education.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Surat",
        "addressRegion": "Gujarat",
        "addressCountry": "IN"
      },
      "parentOrganization": {
        "@type": "Organization",
        "name": "Al-Mu'minah Group of Schools",
        "url": "https://almuminahschool.org"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Academic Programs",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "Primary School (Nursery – Grade 5)" }},
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "Middle School (Grade 6 – 8)" }},
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "High School SSC (Grade 9 – 10)" }},
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "Quranic Arabic Word-for-Word Translation" }}
        ]
      },
      "sameAs": []
    }

    <link rel="preconnect" href="https://fonts.googleapis.com" />
